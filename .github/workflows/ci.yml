name: CI

on:
  push:
    branches: [main, master, staging]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for branch/PR refs; let tag builds always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Minimal permissions by default; individual jobs add only what they need.
permissions:
  contents: read

env:
  IMAGE: 1121citrus/pfsense-backup

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    uses: 1121citrus/shared-github-workflows/.github/workflows/lint.yml@main

  # ── Stage 2: Build ─────────────────────────────────────────────────────────
  build:
    needs: lint
    uses: 1121citrus/shared-github-workflows/.github/workflows/build.yml@main
    with:
      image: 1121citrus/pfsense-backup

  # ── Stage 3: Test ──────────────────────────────────────────────────────────
  # All suites run in a single job to avoid 8x artifact download/load overhead.
  # Tests run inside bats/bats:1.13.0 with the Docker socket mounted.
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: { name: docker-image, path: /tmp }
      - run: gunzip -c /tmp/image.tar.gz | docker load
      - name: Run test suites
        run: |
          docker run --rm -i \
            -v "$PWD:$PWD" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e "IMAGE=$IMAGE:latest" \
            --workdir "$PWD" --entrypoint sh bats/bats:1.13.0 \
            -c "apk add --quiet --no-cache docker-cli >/dev/null 2>&1 \
                && bats test/01-build.bats \
                       test/02-pfsense-backup.bats \
                       test/03-backup-required-vars.bats \
                       test/04-backup-success.bats \
                       test/05-backup-encryption.bats \
                       test/06-backup-aws-failure.bats \
                       test/07-backup-xml-validation.bats \
                       test/08-healthcheck.bats"

  # ── Stage 4: Security scan ─────────────────────────────────────────────────
  scan:
    needs: build
    uses: 1121citrus/shared-github-workflows/.github/workflows/scan.yml@main
    with:
      image: 1121citrus/pfsense-backup
      trivyignore: .trivyignore.yaml

  # ── Stage 5: Push to Docker Hub ────────────────────────────────────────────
  push:
    needs: [test, scan]
    if: >
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/staging'
      )
    uses: 1121citrus/shared-github-workflows/.github/workflows/push.yml@main
    with:
      image: 1121citrus/pfsense-backup
    secrets: inherit
