name: CI

on:
  push:
    branches: [dev, main, master, staging]
    tags: ["v*"]
  pull_request:
    branches: [dev, main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  ci:
    uses: 1121citrus/shared-github-workflows/.github/workflows/pipeline.yml@v1
    with:
      image: 1121citrus/pfsense-backup
      inject-metadata: true
      test-mode: bats-docker-cli
      test-bats-files: |
        test/01-build.bats
        test/02-pfsense-backup.bats
        test/03-backup-required-vars.bats
        test/04-backup-success.bats
        test/05-backup-encryption.bats
        test/06-backup-aws-failure.bats
        test/07-backup-xml-validation.bats
        test/08-healthcheck.bats
        test/09-image-metadata.bats
        test/10-pfsense-backup-cli-flags.bats
        test/11-scheduler-mode.bats
        test/12-multi-bucket.bats
      smoke-enabled: true
      smoke-commands: |
        docker run --rm "${IMAGE}:${VERSION}" bash -c 'test -x /usr/local/bin/backup'
        docker run --rm "${IMAGE}:${VERSION}" /usr/local/bin/pfsense-backup --help
        docker run --rm --entrypoint bash "${IMAGE}:${VERSION}" --version
        docker run --rm --entrypoint aws "${IMAGE}:${VERSION}" --version
        docker run --rm --entrypoint ssh "${IMAGE}:${VERSION}" -V
        docker run --rm --entrypoint sshpass "${IMAGE}:${VERSION}" -V
        docker run --rm --entrypoint test "${IMAGE}:${VERSION}" -f /usr/local/include/common-functions
        docker run --rm --entrypoint test "${IMAGE}:${VERSION}" -x /usr/local/bin/healthcheck
      trivyignore: .trivyignore.yaml
    secrets: inherit
