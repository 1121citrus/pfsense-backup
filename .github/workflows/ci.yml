name: CI

on:
  push:
    branches: [main, master, staging]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

# Minimal permissions by default; individual jobs add only what they need.
permissions:
  contents: read

env:
  IMAGE: 1121citrus/pfsense-backup

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Run ShellCheck
        # SC1090: can't follow dynamic source paths (common-functions is not
        #         present at lint time — suppress project-wide).
        # SC1091: source target (/usr/local/bin/common-functions) is an
        #         install-time absolute path, not resolvable at lint time.
        # SC2148: files without a shebang are intentionally sourced libraries.
        run: |
          shellcheck \
            --shell=bash \
            --exclude=SC1090,SC1091,SC2148 \
            src/backup \
            src/common-functions \
            src/healthcheck \
            src/startup \
            test/backup-aws-failure \
            test/backup-encryption \
            test/backup-required-vars \
            test/backup-success \
            test/backup-xml-validation \
            test/healthcheck \
            test/pfsense-backup \
            test/run-all \
            test/staging \
            test/bin/aws \
            test/bin/ssh \
            test/bin/sshpass \
            test/bin/traceroute \
            build

      - name: Lint markdown with markdownlint-cli
        run: |
          docker run --rm \
            -v "$PWD:/workdir:ro" \
            -w /workdir \
            ghcr.io/igorshubovych/markdownlint-cli:v0.48.0 \
            "**/*.md"

  # ── Stage 2: Build ─────────────────────────────────────────────────────────
  # Build image once, share as artifact so all test jobs use the same image.
  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load into local daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # Single-arch load: --load does not support multi-platform manifests.
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE }}:ci-${{ github.sha }}

      # Re-tag as :latest so test scripts that default to IMAGE:latest work
      # without modification.
      - name: Re-tag as :latest for test scripts
        run: docker tag "$IMAGE:ci-${{ github.sha }}" "$IMAGE:latest"

      - name: Export image tarball
        run: docker save "$IMAGE:latest" | gzip > /tmp/pfsense-backup.tar.gz

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/pfsense-backup.tar.gz
          retention-days: 1

  # ── Stage 3: Tests (parallel) ──────────────────────────────────────────────
  # One job per test suite so failures are reported individually in the UI.
  test-required-vars:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }
      - run: docker load < /tmp/pfsense-backup.tar.gz
      - name: backup-required-vars
        run: ./test/backup-required-vars

  test-backup-success:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }
      - run: docker load < /tmp/pfsense-backup.tar.gz
      - name: backup-success
        run: ./test/backup-success

  test-encryption:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }
      - run: docker load < /tmp/pfsense-backup.tar.gz
      - name: backup-encryption
        run: ./test/backup-encryption

  test-xml-validation:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }
      - run: docker load < /tmp/pfsense-backup.tar.gz
      - name: backup-xml-validation
        run: ./test/backup-xml-validation

  test-aws-failure:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }
      - run: docker load < /tmp/pfsense-backup.tar.gz
      - name: backup-aws-failure
        run: ./test/backup-aws-failure

  test-healthcheck:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }
      - run: docker load < /tmp/pfsense-backup.tar.gz
      - name: healthcheck
        run: ./test/healthcheck

  # ── Stage 4: Security scan ─────────────────────────────────────────────────
  # Scans the built image before pushing.  Fails the job (and blocks push) if
  # any fixable HIGH or CRITICAL CVEs are found; unfixed CVEs are suppressed.
  scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }

      - name: Load image
        run: docker load < /tmp/pfsense-backup.tar.gz

      - name: Cache Trivy vulnerability DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_NO_PROGRESS: "true"
          TRIVY_QUIET: "true"

  # ── Stage 5: Push to Docker Hub ────────────────────────────────────────────
  # Runs only on version tags and the staging branch; never on plain main pushes.
  # Version tags → image:X.Y.Z + image:latest
  # Staging branch → image:staging-<timestamp> + image:staging
  push:
    needs: [test-required-vars, test-backup-success, test-encryption,
            test-xml-validation, test-aws-failure, test-healthcheck, scan]
    if: >
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/staging'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tags=${IMAGE}:${GITHUB_REF_NAME#v},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:staging-$(date -u +%Y.%m.%d.%H%M%S),${IMAGE}:staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (multi-platform cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.tags.outputs.tags }}
